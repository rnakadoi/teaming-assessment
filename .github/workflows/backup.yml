name: DB Backup

on:
  schedule:
    # 毎週月曜 5:00 JST（= 日曜 20:00 UTC）
    - cron: '0 20 * * 0'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  backup:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      # サーバは PostgreSQL 17（Supabase）。ubuntu-latest 標準の client 16 では
      # バージョン不一致で pg_dump が中断するため、PGDG から 17 を入れる
      - name: Install postgresql-client 17
        run: |
          set -euo pipefail
          sudo apt-get update -qq
          sudo apt-get install -y -qq postgresql-common
          sudo /usr/share/postgresql-common/pgdg/apt.postgresql.org.sh -y
          sudo apt-get install -y -qq postgresql-client-17
          pg_dump --version

      - name: Set artifact date
        id: date
        run: echo "date=$(TZ=Asia/Tokyo date +%Y%m%d)" >> "$GITHUB_OUTPUT"

      # リポジトリが public のため Artifact は閲覧者がダウンロード可能。
      # ダンプ（匿名回答＋リード登録メールアドレスを含む）は必ず暗号化する
      - name: Dump and encrypt (public + metamo schemas)
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
          BACKUP_PASSPHRASE: ${{ secrets.BACKUP_PASSPHRASE }}
        run: |
          set -euo pipefail
          : "${SUPABASE_DB_URL:?GitHub Secrets SUPABASE_DB_URL is not set}"
          : "${BACKUP_PASSPHRASE:?GitHub Secrets BACKUP_PASSPHRASE is not set}"
          pg_dump "$SUPABASE_DB_URL" \
            --schema=public \
            --schema=metamo \
            --no-owner \
            --no-privileges \
            | gzip -9 \
            | gpg --symmetric --batch --yes \
                --pinentry-mode loopback \
                --cipher-algo AES256 \
                --passphrase "$BACKUP_PASSPHRASE" \
                --output backup.sql.gz.gpg
          test -s backup.sql.gz.gpg
          ls -l backup.sql.gz.gpg

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ieruka-db-backup-${{ steps.date.outputs.date }}-${{ github.run_id }}
          path: backup.sql.gz.gpg
          retention-days: 90
          if-no-files-found: error
